<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL_CYO ダッシュボード ビジュアル表示版 v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic Medium", "Noto Sans JP", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    line-height: 1.6;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
    padding: 24px 32px;
    border-bottom: 1px solid #1e293b;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px;
  }
  header h1 { font-size: 20px; font-weight: 700; color: white; }
  header .meta { font-size: 12px; color: #94a3b8; }
  header .meta strong { color: #60a5fa; }

  .period-tabs {
    display: flex; gap: 4px; padding: 16px 32px;
    background: #1e293b; border-bottom: 1px solid #334155;
  }
  .period-tabs button {
    padding: 8px 18px; background: transparent; border: 1px solid #334155;
    color: #94a3b8; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: all 0.2s;
  }
  .period-tabs button:hover { color: white; border-color: #60a5fa; }
  .period-tabs button.active {
    background: #3b82f6; color: white; border-color: #3b82f6; font-weight: 600;
  }

  main { padding: 24px 32px 60px; max-width: 1400px; margin: 0 auto; }

  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .kpi {
    background: #1e293b; border-radius: 12px; padding: 18px 20px;
    border: 1px solid #334155;
  }
  .kpi .label { font-size: 11px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .kpi .value { font-size: 28px; font-weight: 700; color: white; line-height: 1.1; }
  .kpi .sub { font-size: 12px; color: #64748b; margin-top: 4px; }
  .kpi.accent .value { color: #60a5fa; }
  .kpi.warn .value { color: #fbbf24; }
  .kpi.danger .value { color: #f87171; }
  .kpi.success .value { color: #4ade80; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: #1e293b; border-radius: 12px; padding: 20px;
    border: 1px solid #334155;
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #334155;
    flex-wrap: wrap; gap: 8px;
  }
  .card-title { font-size: 14px; font-weight: 700; color: white;
    display: flex; align-items: center; gap: 8px; }
  .card-title .icon { color: #60a5fa; }
  .card-meta { font-size: 11px; color: #64748b; }

  /* ★ ソートボタングループ */
  .sort-group {
    display: flex; gap: 2px; padding: 3px;
    background: #0f172a; border-radius: 8px; width: fit-content;
    margin-bottom: 14px;
  }
  .sort-group button {
    padding: 5px 12px; background: transparent; border: none;
    color: #94a3b8; cursor: pointer; font-size: 11px; border-radius: 5px;
    transition: all 0.15s;
  }
  .sort-group button:hover { color: white; }
  .sort-group button.active { background: #3b82f6; color: white; font-weight: 600; }
  .sort-group button .arrow { display: inline-block; margin-left: 4px; font-size: 9px; }

  /* ランキング */
  .ranking { display: flex; flex-direction: column; gap: 8px; }
  .rank-item {
    display: grid; grid-template-columns: 24px 1fr auto auto; gap: 10px;
    align-items: center; padding: 8px 10px; background: #0f172a;
    border-radius: 6px; font-size: 13px;
  }
  .rank-num { font-weight: 700; color: #64748b; font-size: 12px; text-align: center; }
  .rank-name { color: #e2e8f0; }
  .rank-bar-wrap { width: 80px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
  .rank-bar { height: 100%; border-radius: 3px; }
  .rank-bar.green { background: #4ade80; }
  .rank-bar.yellow { background: #fbbf24; }
  .rank-bar.red { background: #f87171; }
  .rank-value { font-weight: 600; font-size: 13px; min-width: 60px; text-align: right; }
  .rank-value.green { color: #4ade80; }
  .rank-value.yellow { color: #fbbf24; }
  .rank-value.red { color: #f87171; }

  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-item { display: grid; grid-template-columns: 1fr; gap: 4px; font-size: 12px; }
  .bar-label { display: flex; justify-content: space-between; color: #cbd5e1; font-size: 12px; }
  .bar-track { width: 100%; height: 18px; background: #0f172a; border-radius: 4px; overflow: hidden; display: flex; }
  .bar-seg { height: 100%; transition: all 0.3s; }
  .bar-seg.print { background: #3b82f6; }
  .bar-seg.emb   { background: #06b6d4; }
  .bar-seg.pre   { background: #8b5cf6; }
  .bar-value { font-weight: 600; color: white; }

  .legend { display: flex; gap: 16px; font-size: 11px; color: #94a3b8; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* ★ ソート可能テーブル */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th, .data-table td {
    padding: 8px 10px; text-align: right; border-bottom: 1px solid #334155;
  }
  .data-table th {
    text-align: right; color: #94a3b8; font-weight: 600;
    background: #0f172a; font-size: 11px;
    cursor: pointer; user-select: none; transition: all 0.15s;
    white-space: nowrap; position: relative;
  }
  .data-table th:hover { color: white; background: #1e293b; }
  .data-table th:first-child, .data-table td:first-child { text-align: left; }
  .data-table th.sort-asc::after { content: ' ▲'; color: #60a5fa; font-size: 9px; }
  .data-table th.sort-desc::after { content: ' ▼'; color: #60a5fa; font-size: 9px; }
  .data-table tr:hover td { background: #0f172a; }
  .data-table .total-row { background: #1e293b; font-weight: 700; }
  .data-table .total-row td { color: #fbbf24; border-top: 2px solid #fbbf24; }

  .tabs {
    display: flex; gap: 2px; margin-bottom: 12px; padding: 3px;
    background: #0f172a; border-radius: 8px; width: fit-content;
  }
  .tabs button {
    padding: 6px 14px; background: transparent; border: none;
    color: #94a3b8; cursor: pointer; font-size: 12px; border-radius: 5px;
  }
  .tabs button.active { background: #3b82f6; color: white; }

  /* 送料明細 */
  .ship-table-wrap { max-height: 350px; overflow-y: auto; border-radius: 6px; }
  .ship-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ship-table th {
    position: sticky; top: 0; background: #0f172a; padding: 8px;
    color: #94a3b8; font-size: 11px; text-align: left; z-index: 1;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .ship-table th:hover { color: white; }
  .ship-table th.sort-asc::after { content: ' ▲'; color: #60a5fa; font-size: 9px; }
  .ship-table th.sort-desc::after { content: ' ▼'; color: #60a5fa; font-size: 9px; }
  .ship-table th:last-child { text-align: right; }
  .ship-table td { padding: 6px 8px; border-bottom: 1px solid #1e293b; }
  .ship-table tr:hover td { background: #0f172a; }
  .ship-table .ship-store { color: #60a5fa; }
  .ship-table .ship-fee { text-align: right; font-weight: 600; color: #4ade80; }
  .ship-table .ship-fee.zero { color: #64748b; }

  .hidden { display: none !important; }

  /* バーチャート用ソートセレクト */
  select.chart-sort {
    padding: 4px 10px; background: #0f172a; color: #cbd5e1;
    border: 1px solid #334155; border-radius: 6px; font-size: 12px;
    cursor: pointer;
  }
  select.chart-sort:hover { border-color: #60a5fa; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #64748b; }

  .proto-banner {
    background: linear-gradient(90deg, #f59e0b 0%, #dc2626 100%);
    color: white; padding: 8px 16px; text-align: center;
    font-size: 12px; letter-spacing: 0.5px;
  }
  footer { text-align: center; padding: 32px; color: #64748b; font-size: 11px; }

  /* ============================ */
  /* 請求書プレビュー */
  /* ============================ */
  .invoice-card .card-head {
    background: linear-gradient(90deg, #1e293b 0%, transparent 100%);
    margin-left: -20px; margin-right: -20px; margin-top: -20px;
    padding: 16px 20px; border-radius: 12px 12px 0 0;
  }
  .invoice-subject {
    padding: 12px 16px; background: #0f172a; border-radius: 8px;
    margin-bottom: 12px; font-size: 13px; color: #cbd5e1;
  }
  .invoice-subject strong { color: white; }
  .invoice-amount-box {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    padding: 16px 24px; border-radius: 10px; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .invoice-amount-box .label { font-size: 13px; opacity: 0.85; color: white; }
  .invoice-amount-box .amount { font-size: 28px; font-weight: 700; color: white; }

  table.invoice-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.invoice-table th {
    background: #0f172a; padding: 10px 12px; color: #94a3b8;
    font-size: 11px; font-weight: 600;
    border-bottom: 2px solid #334155;
  }
  table.invoice-table th.right, table.invoice-table td.right { text-align: right; }
  table.invoice-table td {
    padding: 10px 12px; border-bottom: 1px solid #1e293b; color: #e2e8f0;
  }
  table.invoice-table tr.zero td { color: #475569; }
  table.invoice-table td.price { font-weight: 600; }
  table.invoice-table tr.ship-row td { background: #0f172a; }
  table.invoice-table tr.ship-row input {
    background: #1e293b; border: 1px solid #475569; border-radius: 4px;
    color: white; padding: 4px 8px; width: 90px; text-align: right;
    font-size: 13px; font-family: inherit;
  }
  table.invoice-table tr.ship-row input:focus { outline: none; border-color: #60a5fa; }

  .invoice-summary {
    margin-top: 16px; padding: 14px 18px; background: #0f172a;
    border-radius: 8px;
  }
  .invoice-summary-row {
    display: flex; justify-content: space-between; padding: 4px 0;
    font-size: 13px; color: #cbd5e1;
  }
  .invoice-summary-row.grand {
    border-top: 2px solid #475569; margin-top: 8px; padding-top: 12px;
    font-size: 16px; font-weight: 700; color: #fbbf24;
  }
  .invoice-tax-box {
    margin-top: 12px; padding: 10px 14px; background: #1e293b;
    border-radius: 6px; font-size: 11px; color: #94a3b8;
  }
  .invoice-tax-box .header {
    color: #cbd5e1; font-weight: 600; margin-bottom: 4px;
  }
  .invoice-tax-grid {
    display: grid; grid-template-columns: 60px 1fr 1fr 1fr;
    gap: 8px; font-family: monospace;
  }
  .invoice-tax-grid > div:not(:first-child) { text-align: right; }

  .total-card {
    background: linear-gradient(135deg, #065f46 0%, #047857 100%);
    border: none;
  }
  .total-card .total-amount {
    font-size: 32px; font-weight: 700; color: white; line-height: 1.1;
  }
  .total-card .total-label {
    font-size: 12px; color: #d1fae5; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .total-card .total-sub {
    font-size: 12px; color: #6ee7b7; margin-top: 6px;
  }
</style>

  <section class="grid-2">

        <div class="card-meta">列ヘッダークリックで並び替え</div>
      </div>
      <div class="tabs">
        <button class="active" onclick="switchDetailTab('print')">プリント</button>
        <button onclick="switchDetailTab('embroidery')">刺繍</button>
      </div>
      <div id="detail-print-wrap">
        <table class="data-table" id="detail-print-table"></table>
      </div>
      <div id="detail-emb-wrap" class="hidden">
        <table class="data-table" id="detail-emb-table"></table>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title"><span class="icon">📋</span> 製作数合計テーブル</div>
        <div class="card-meta">列ヘッダークリックで並び替え</div>
      </div>
      <table class="data-table" id="production-table"></table>
    </div>
  </section>

  <!-- 請求書プレビュー -->
  <section class="card invoice-card" style="margin-bottom:20px">
    <div class="card-head">
      <div class="card-title"><span class="icon">💰</span> 請求書プレビュー</div>
      <div style="display:flex; align-items:center; gap:8px">
        <span class="card-meta">店舗:</span>
        <select class="chart-sort" id="invoice-store"></select>
      </div>
    </div>
    <div id="invoice-content"></div>
  </section>

  <section class="card">
    <div class="card-head">
      <div class="card-title"><span class="icon">🚚</span> 送料明細</div>
      <div class="card-meta" id="ship-meta"></div>
    </div>
    <div class="ship-table-wrap">
      <table class="ship-table">
        <thead>
          <tr id="ship-thead">
            <th data-col="store">店舗</th>
            <th data-col="tab">発送内容（タブ名）</th>
            <th data-col="no">送り状No</th>
            <th data-col="fee">送料</th>
          </tr>
        </thead>
        <tbody id="ship-tbody"></tbody>
      </table>
    </div>
  </section>
</main>

<footer>RL_CYO ダッシュボード v4.0 ビジュアル表示版 v2 — 並び替え対応</footer>

// ==========================================
// ソート状態
// ==========================================
const sortState = {
  storeMissCol: 'name', storeMissDir: 'asc',
  workerMissCol: 'rate', workerMissDir: 'desc',
  chartSort: 'total-desc',
  productionCol: null, productionDir: 'asc',
  printCol: null, printDir: 'asc',
  embCol: null, embDir: 'asc',
  shipCol: null, shipDir: 'asc'
};

let currentPeriod = 'caravan';

// ==========================================
// 共通ソート関数
// ==========================================
function genericSort(arr, col, dir) {
  const sorted = [...arr].sort((a, b) => {
    const va = a[col], vb = b[col];
    if (typeof va === 'string') {
      return dir === 'asc' ? va.localeCompare(vb, 'ja') : vb.localeCompare(va, 'ja');
    }
    return dir === 'asc' ? va - vb : vb - va;
  });
  return sorted;
}

function toggleDir(currentCol, newCol, currentDir) {
  if (currentCol === newCol) {
    return currentDir === 'asc' ? 'desc' : 'asc';
  }
  return 'desc';
}

// ==========================================
// 期間切替
// ==========================================
function switchPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function switchDetailTab(tab) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('detail-print-wrap').classList.toggle('hidden', tab !== 'print');
  document.getElementById('detail-emb-wrap').classList.toggle('hidden', tab !== 'embroidery');
}

function rateColor(rate) {
  if (rate >= 10) return 'red';
  if (rate >= 5) return 'yellow';
  return 'green';
}

// ==========================================
// 各セクションのレンダリング
// ==========================================
function renderKPI(d) {
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi accent">
      <div class="label">総製作数</div>
      <div class="value">${d.summary.totalProduction.toLocaleString()}</div>
      <div class="sub">${d.name}</div>
    </div>
    <div class="kpi success">
      <div class="label">対象店舗</div>
      <div class="value">${d.summary.stores}</div>
      <div class="sub">${currentPeriod === 'caravan' ? 'シーズン店舗' : '店舗×月'}</div>
    </div>
    <div class="kpi ${d.summary.missRate >= 5 ? 'danger' : d.summary.missRate >= 2 ? 'warn' : 'success'}">
      <div class="label">ミス率</div>
      <div class="value">${d.summary.missRate.toFixed(2)}%</div>
      <div class="sub">〇${d.summary.maru} / △${d.summary.sankaku} / ✕${d.summary.batsu}</div>
    </div>
    <div class="kpi">
      <div class="label">送料合計</div>
      <div class="value">¥${d.stores.reduce((s, x) => s + x.ship, 0).toLocaleString()}</div>
      <div class="sub">配送費用累計</div>
    </div>
  `;
}

function renderStoreMiss(d) {
  let sorted = genericSort(d.stores, sortState.storeMissCol, sortState.storeMissDir);
  // ミス率/製作数/✕件数で並べる場合のみ、データなし店舗を末尾に
  // 店舗名順の場合は純粋なA→Z（バーチャートの並び順と揃える）
  if (sortState.storeMissCol !== 'name') {
    sorted.sort((a, b) => {
      const aHas = a.maru + a.sankaku + a.batsu > 0;
      const bHas = b.maru + b.sankaku + b.batsu > 0;
      if (aHas !== bHas) return bHas - aHas;
      return 0;
    });
  }
  document.getElementById('store-miss-ranking').innerHTML = sorted.map((s, i) => {
    const c = rateColor(s.rate);
    return `
      <div class="rank-item">
        <div class="rank-num">${i + 1}</div>
        <div class="rank-name">${s.name}</div>
        <div class="rank-bar-wrap"><div class="rank-bar ${c}" style="width:${Math.min(s.rate * 5, 100)}%"></div></div>
        <div class="rank-value ${c}">${s.rate.toFixed(2)}%</div>
      </div>
    `;
  }).join('');
  // ボタンの矢印更新
  document.querySelectorAll('#store-sort button').forEach(b => {
    const isActive = b.dataset.sort === sortState.storeMissCol;
    b.classList.toggle('active', isActive);
    b.querySelector('.arrow').textContent = isActive ? (sortState.storeMissDir === 'desc' ? '▼' : '▲') : '';
  });
}

function renderWorkerMiss(d) {
  const sorted = genericSort(d.workers, sortState.workerMissCol, sortState.workerMissDir);
  document.getElementById('worker-miss-ranking').innerHTML = sorted.map((w, i) => {
    const c = rateColor(w.rate);
    return `
      <div class="rank-item">
        <div class="rank-num">${i + 1}</div>
        <div class="rank-name">${w.name}（${w.total}件）</div>
        <div class="rank-bar-wrap"><div class="rank-bar ${c}" style="width:${Math.min(w.rate * 5, 100)}%"></div></div>
        <div class="rank-value ${c}">${w.rate.toFixed(2)}%</div>
      </div>
    `;
  }).join('');
  document.querySelectorAll('#worker-sort button').forEach(b => {
    const isActive = b.dataset.sort === sortState.workerMissCol;
    b.classList.toggle('active', isActive);
    b.querySelector('.arrow').textContent = isActive ? (sortState.workerMissDir === 'desc' ? '▼' : '▲') : '';
  });
}

function renderChart(d) {
  const [key, dir] = sortState.chartSort.split('-');
  const sorted = genericSort(d.stores, key, dir);
  const maxTotal = Math.max(...d.stores.map(s => s.total)) || 1;
  document.getElementById('production-chart').innerHTML = sorted.map(s => {
    const pPct = (s.print / maxTotal) * 100;
    const ePct = (s.emb / maxTotal) * 100;
    const prePct = (s.pre / maxTotal) * 100;
    return `
      <div class="bar-item">
        <div class="bar-label">
          <span>${s.name}</span>
          <span class="bar-value">${s.total}件</span>
        </div>
        <div class="bar-track">
          <div class="bar-seg print" style="width:${pPct}%" title="プリント ${s.print}"></div>
          <div class="bar-seg emb"   style="width:${ePct}%" title="刺繍 ${s.emb}"></div>
          <div class="bar-seg pre"   style="width:${prePct}%" title="前処理 ${s.pre}"></div>
        </div>
      </div>
    `;
  }).join('');
}

function renderProductionTable(d) {
  const columns = [
    { key: 'name', label: '店舗' },
    { key: 'print', label: 'プリント計' },
    { key: 'emb', label: '刺繍計' },
    { key: 'pre', label: '前処理' },
    { key: 'total', label: '合計' },
    { key: 'ship', label: '送料' }
  ];
  let rows = sortState.productionCol
    ? genericSort(d.stores, sortState.productionCol, sortState.productionDir)
    : d.stores;
  const thead = `<thead><tr>${columns.map(c => {
    const cls = sortState.productionCol === c.key ? `sort-${sortState.productionDir}` : '';
    return `<th class="${cls}" data-col="${c.key}">${c.label}</th>`;
  }).join('')}</tr></thead>`;
  const tbody = `<tbody>${rows.map(s => `
    <tr>
      <td>${s.name}</td>
      <td>${s.print}</td>
      <td>${s.emb}</td>
      <td>${s.pre}</td>
      <td><strong>${s.total}</strong></td>
      <td>¥${s.ship.toLocaleString()}</td>
    </tr>
  `).join('')}
  <tr class="total-row">
    <td>★合計</td>
    <td>${d.stores.reduce((s, x) => s + x.print, 0)}</td>
    <td>${d.stores.reduce((s, x) => s + x.emb, 0)}</td>
    <td>${d.stores.reduce((s, x) => s + x.pre, 0)}</td>
    <td>${d.stores.reduce((s, x) => s + x.total, 0)}</td>
    <td>¥${d.stores.reduce((s, x) => s + x.ship, 0).toLocaleString()}</td>
  </tr></tbody>`;
  document.getElementById('production-table').innerHTML = thead + tbody;

  // ヘッダクリックハンドラ
  document.querySelectorAll('#production-table th').forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      sortState.productionDir = toggleDir(sortState.productionCol, col, sortState.productionDir);
      sortState.productionCol = col;
      renderProductionTable(d);
    };
  });
}

      sortState.embDir = toggleDir(sortState.embCol, col, sortState.embDir);
      sortState.embCol = col;
      renderEmbTable(d);
    };
  });
}

// ==========================================
// 請求書計算
// ==========================================
const INVOICE_PRICES = {
  light: 1730,    // 淡色プリント費（両面、白引き無し）= 白 + TOTE
  dark: 2110,     // 濃色プリント費（両面、白引き有り）
  pre: 560,       // 事前前処理作業費
  bottle: 1060,   // ウォーターボトルプリント費
  e1000: 550,
  e2000: 1100,
  e3000: 1650,
  e4000: 2200,
  e4500: 2480
};

// 店舗ごとの送料カスタム値（編集された値を保持）
const shipOverrides = { caravan: {}, permanent: {} };

function getStoreInvoice(d, storeIndex) {
  const store = d.stores[storeIndex];
  const printRow = d.print[storeIndex];
  const embRow = d.emb[storeIndex];

  // 「白 + TOTE」を淡色プリント費に合算（数値の内部値を使う）
  const lightQty = (printRow?._white || 0) + (printRow?._tote || 0);
  const darkQty = printRow?._dark || 0;
  const bottleQty = printRow?._bottle || 0;
  const preQty = store?.pre || 0;

  // 送料：オーバーライド値があればそれを使う
  const shipKey = `${currentPeriod}_${storeIndex}`;
  const defaultShip = store?.ship || 0;
  const shipFee = shipOverrides[currentPeriod][storeIndex] !== undefined
    ? shipOverrides[currentPeriod][storeIndex] : defaultShip;

  const items = [
    { name: '淡色プリント費（両面、白引き無し）', price: INVOICE_PRICES.light, qty: lightQty },
    { name: '濃色プリント費（両面、白引き有り）', price: INVOICE_PRICES.dark, qty: darkQty },
    { name: '事前前処理作業費', price: INVOICE_PRICES.pre, qty: preQty },
    { name: 'ウォーターボトルプリント費', price: INVOICE_PRICES.bottle, qty: bottleQty },
    { name: '刺繍 1,000円', price: INVOICE_PRICES.e1000, qty: embRow?.p1000 || 0 },
    { name: '刺繍 2,000円', price: INVOICE_PRICES.e2000, qty: embRow?.p2000 || 0 },
    { name: '刺繍 3,000円', price: INVOICE_PRICES.e3000, qty: embRow?.p3000 || 0 },
    { name: '刺繍 4,000円', price: INVOICE_PRICES.e4000, qty: embRow?.p4000 || 0 },
    { name: '刺繍 4,500円', price: INVOICE_PRICES.e4500, qty: embRow?.p4500 || 0 }
  ];
  items.forEach(it => it.sub = it.price * it.qty);

  // 送料は別扱い（編集可能）
  const shipItem = { name: '送料', price: shipFee, qty: 1, sub: shipFee, editable: true };

  const subtotal = items.reduce((s, i) => s + i.sub, 0) + shipItem.sub;
  const tax = Math.round(subtotal * 0.10);
  const total = subtotal + tax;

  return { store, items, shipItem, subtotal, tax, total };
}

function renderInvoice() {
  const d = data[currentPeriod];
  const select = document.getElementById('invoice-store');

  // プルダウン初期化（期間切替時のみ再構築）
  const expectedOpts = d.stores.length + 1; // +1 = 全店舗合計
  if (select.options.length !== expectedOpts) {
    select.innerHTML = `<option value="all">📊 全店舗合計</option>` +
      d.stores.map((s, i) => `<option value="${i}">${s.name}</option>`).join('');
  }

  const value = select.value || 'all';
  let html = '';

  if (value === 'all') {
    // 全店舗合計
    let totalItems = INVOICE_PRICES;
    let aggregated = [
      { name: '淡色プリント費（両面、白引き無し）', price: INVOICE_PRICES.light, qty: 0 },
      { name: '濃色プリント費（両面、白引き有り）', price: INVOICE_PRICES.dark, qty: 0 },
      { name: '事前前処理作業費', price: INVOICE_PRICES.pre, qty: 0 },
      { name: 'ウォーターボトルプリント費', price: INVOICE_PRICES.bottle, qty: 0 },
      { name: '刺繍 1,000円', price: INVOICE_PRICES.e1000, qty: 0 },
      { name: '刺繍 2,000円', price: INVOICE_PRICES.e2000, qty: 0 },
      { name: '刺繍 3,000円', price: INVOICE_PRICES.e3000, qty: 0 },
      { name: '刺繍 4,000円', price: INVOICE_PRICES.e4000, qty: 0 },
      { name: '刺繍 4,500円', price: INVOICE_PRICES.e4500, qty: 0 }
    ];
    let totalShip = 0;
    d.stores.forEach((s, i) => {
      const inv = getStoreInvoice(d, i);
      inv.items.forEach((it, idx) => { aggregated[idx].qty += it.qty; });
      totalShip += inv.shipItem.sub;
    });
    aggregated.forEach(it => it.sub = it.price * it.qty);
    const shipItem = { name: '送料', price: totalShip, qty: 1, sub: totalShip, editable: false };
    const subtotal = aggregated.reduce((s, i) => s + i.sub, 0) + shipItem.sub;
    const tax = Math.round(subtotal * 0.10);
    const total = subtotal + tax;

    html = buildInvoiceHTML({
      subject: `${d.name} 全店舗合計`,
      items: aggregated,
      shipItem,
      subtotal, tax, total,
      storeIndex: 'all'
    });
  } else {
    const idx = parseInt(value);
    const inv = getStoreInvoice(d, idx);
    html = buildInvoiceHTML({
      subject: `2026 SS SIS CYO Factory Print ${inv.store.name}`,
      items: inv.items,
      shipItem: inv.shipItem,
      subtotal: inv.subtotal,
      tax: inv.tax,
      total: inv.total,
      storeIndex: idx
    });
  }

  document.getElementById('invoice-content').innerHTML = html;

  // 送料入力ハンドラ
  const shipInput = document.getElementById('ship-fee-input');
  if (shipInput) {
    shipInput.oninput = (e) => {
      const v = parseInt(e.target.value) || 0;
      shipOverrides[currentPeriod][parseInt(value)] = v;
      renderInvoice();
      // フォーカスを保持
      setTimeout(() => {
        const newInput = document.getElementById('ship-fee-input');
        if (newInput) { newInput.focus(); newInput.setSelectionRange(newInput.value.length, newInput.value.length); }
      }, 0);
    };
  }
}

function buildInvoiceHTML({ subject, items, shipItem, subtotal, tax, total, storeIndex }) {
  const itemsHTML = items.map(it => `
    <tr class="${it.qty === 0 ? 'zero' : ''}">
      <td>${it.name}</td>
      <td class="right">¥${it.price.toLocaleString()}</td>
      <td class="right">${it.qty}</td>
      <td class="right price">¥${it.sub.toLocaleString()}</td>
    </tr>
  `).join('');

  const shipHTML = storeIndex !== 'all' ? `
    <tr class="ship-row">
      <td>${shipItem.name}</td>
      <td class="right"><input type="number" id="ship-fee-input" value="${shipItem.price}" min="0" step="100" /></td>
      <td class="right">1</td>
      <td class="right price">¥${shipItem.sub.toLocaleString()}</td>
    </tr>
  ` : `
    <tr class="ship-row">
      <td>${shipItem.name}（全店舗合計）</td>
      <td class="right">-</td>
      <td class="right">-</td>
      <td class="right price">¥${shipItem.sub.toLocaleString()}</td>
    </tr>
  `;

  return `
    <div class="invoice-subject">件名: <strong>${subject}</strong></div>
    <div class="invoice-amount-box">
      <div class="label">ご請求金額（税込）</div>
      <div class="amount">¥${total.toLocaleString()}</div>
    </div>
    <table class="invoice-table">
      <thead>
        <tr>
          <th>品目</th>
          <th class="right">単価</th>
          <th class="right">数量</th>
          <th class="right">価格</th>
        </tr>
      </thead>
      <tbody>${itemsHTML}${shipHTML}</tbody>
    </table>
    <div class="invoice-summary">
      <div class="invoice-summary-row"><span>小計</span><span>¥${subtotal.toLocaleString()}</span></div>
      <div class="invoice-summary-row"><span>消費税額合計（10%）</span><span>¥${tax.toLocaleString()}</span></div>
      <div class="invoice-summary-row grand"><span>合計</span><span>¥${total.toLocaleString()}</span></div>
    </div>
    <div class="invoice-tax-box">
      <div class="header">税率別内訳</div>
      <div class="invoice-tax-grid">
        <div></div><div>税抜金額</div><div>消費税額</div><div>税込金額</div>
        <div>10%</div><div>¥${subtotal.toLocaleString()}</div><div>¥${tax.toLocaleString()}</div><div>¥${total.toLocaleString()}</div>
      </div>
    </div>
  `;
}

function renderShipping(d) {
  document.getElementById('ship-meta').textContent =
    `${d.shipping.length}件 / 合計 ¥${d.shipping.reduce((s, x) => s + x.fee, 0).toLocaleString()}`;
  let rows = sortState.shipCol
    ? genericSort(d.shipping, sortState.shipCol, sortState.shipDir)
    : d.shipping;
  document.getElementById('ship-tbody').innerHTML = rows.map(s => `
    <tr>
      <td class="ship-store">${s.store}</td>
      <td>${s.tab}</td>
      <td>${s.no}</td>
      <td class="ship-fee ${s.fee === 0 ? 'zero' : ''}">¥${s.fee.toLocaleString()}</td>
    </tr>
  `).join('');
  // ヘッダーのクラス更新
  document.querySelectorAll('#ship-thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortState.shipCol) {
      th.classList.add(`sort-${sortState.shipDir}`);
    }
  });
}

// ==========================================
// メインレンダリング
// ==========================================
function render() {
  const d = data[currentPeriod];
  renderKPI(d);
  renderStoreMiss(d);
  renderWorkerMiss(d);
  renderChart(d);
  renderProductionTable(d);
  renderPrintTable(d);
  renderEmbTable(d);
  renderInvoice();
  renderShipping(d);
}

// 期間切替時に invoice の選択をリセット
const _origSwitchPeriod = switchPeriod;
switchPeriod = function(period) {
  _origSwitchPeriod(period);
  const sel = document.getElementById('invoice-store');
  if (sel) sel.value = 'all';
};

// 請求書プルダウンのハンドラ
document.getElementById('invoice-store').onchange = () => renderInvoice();

// ==========================================
// ソートボタンハンドラ
// ==========================================
document.querySelectorAll('#store-sort button').forEach(b => {
  b.onclick = () => {
    const col = b.dataset.sort;
    sortState.storeMissDir = toggleDir(sortState.storeMissCol, col, sortState.storeMissDir);
    sortState.storeMissCol = col;
    renderStoreMiss(data[currentPeriod]);
  };
});
document.querySelectorAll('#worker-sort button').forEach(b => {
  b.onclick = () => {
    const col = b.dataset.sort;
    sortState.workerMissDir = toggleDir(sortState.workerMissCol, col, sortState.workerMissDir);
    sortState.workerMissCol = col;
    renderWorkerMiss(data[currentPeriod]);
  };
});
document.getElementById('chart-sort').onchange = (e) => {
  sortState.chartSort = e.target.value;
  renderChart(data[currentPeriod]);
};
document.querySelectorAll('#ship-thead th').forEach(th => {
  th.onclick = () => {
    const col = th.dataset.col;
    sortState.shipDir = toggleDir(sortState.shipCol, col, sortState.shipDir);
    sortState.shipCol = col;
    renderShipping(data[currentPeriod]);
  };
});

render();
</script>
